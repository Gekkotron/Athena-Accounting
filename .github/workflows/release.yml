name: Release

# Publish a GitHub Release from a version tag.
#
# Trigger with:
#   git tag v0.2.0 && git push origin v0.2.0
#
# The tag body comes from CHANGELOG.md — the section headed
# "## [0.2.0] - YYYY-MM-DD" is extracted and used as the release notes,
# so the same source of truth ships in-repo and on the Releases page.
#
# Build verification runs first (same steps as CI) so a bad tag can't
# publish a release. `permissions: contents: write` is what lets
# softprops/action-gh-release open the release; nothing else needs it.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify-build:
    name: Verify build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: verify-build

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        # ${GITHUB_REF#refs/tags/v} → "0.2.0" from "refs/tags/v0.2.0"
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        # Slice the section headed "## [X.Y.Z] ..." up to the next "## " line
        # and save it to a file (multi-line outputs need heredoc syntax).
        # Fail hard if the section is missing — releasing without notes is
        # almost never what we want, and silent empty releases are worse.
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v ver="${version}" '
            $0 ~ "^## \\[" ver "\\]" { grab=1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version ${version}. Expected a header like '## [${version}] - YYYY-MM-DD'."
            exit 1
          fi

          echo "---- release notes ----"
          cat release-notes.md
          echo "-----------------------"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          # Pre-release when the version has a hyphen (v1.0.0-rc.1, etc.).
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
