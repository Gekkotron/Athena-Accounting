name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: Backend tests + coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: athena
          POSTGRES_PASSWORD: athena
          POSTGRES_DB: athena
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U athena -d athena"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://athena:athena@localhost:5432/athena
      SESSION_SECRET: ci-only-session-secret-not-used-anywhere-else-9f2a
      RUN_DB_TESTS: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Apply database migrations
        working-directory: backend
        run: npx tsx -e 'import("./src/db/migrate.js").then(m => m.runMigrations())'

      - name: Type-check
        working-directory: backend
        run: npx tsc -p tsconfig.json --noEmit

      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Compute today's UTC date (Codecov daily gate)
        if: always()
        id: codecov-day
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Codecov upload gate (backend, once per UTC day)
        # Developer-plan quota is 250 uploads/month across both jobs, so
        # active work days burn it in ~4 weeks. Cache key is per UTC date:
        # first CI run of the day misses → upload runs → post-job save
        # writes the marker. Every subsequent run that day hits and skips.
        # Marker is written only when the upload succeeds (outcome check
        # below) so a failed upload can be retried later the same day.
        if: always()
        id: codecov-gate
        uses: actions/cache@v4
        with:
          path: .codecov-marker-backend
          key: codecov-backend-${{ steps.codecov-day.outputs.date }}

      - name: Upload coverage to Codecov
        # Upload even when the test step failed — a partial coverage report
        # is better than a skipped baseline. If we skip, the NEXT healthy
        # commit posts a fake "coverage dropped" status against the last
        # frontend-only baseline.
        if: always() && steps.codecov-gate.outputs.cache-hit != 'true'
        id: codecov-upload
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Record Codecov upload marker (backend)
        if: always() && steps.codecov-upload.outcome == 'success'
        run: date -u +%Y-%m-%dT%H:%M:%SZ > .codecov-marker-backend

  frontend-tests:
    name: Frontend tests + coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc -p tsconfig.json --noEmit

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Compute today's UTC date (Codecov daily gate)
        if: always()
        id: codecov-day
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Codecov upload gate (frontend, once per UTC day)
        # See backend-tests for the rationale — same mechanism, distinct
        # cache key so backend and frontend gate independently. Together
        # they cap the workflow at 2 Codecov uploads per UTC day, which
        # keeps the Developer-plan 250/month quota safely out of reach
        # even on heavy pushing days.
        if: always()
        id: codecov-gate
        uses: actions/cache@v4
        with:
          path: .codecov-marker-frontend
          key: codecov-frontend-${{ steps.codecov-day.outputs.date }}

      - name: Upload coverage to Codecov
        if: always() && steps.codecov-gate.outputs.cache-hit != 'true'
        id: codecov-upload
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Record Codecov upload marker (frontend)
        if: always() && steps.codecov-upload.outcome == 'success'
        run: date -u +%Y-%m-%dT%H:%M:%SZ > .codecov-marker-frontend

  frontend-e2e:
    name: Frontend e2e (browser-only demo)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
