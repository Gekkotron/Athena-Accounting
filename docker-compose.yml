services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      # Postgres stays bound to localhost only — the backend talks to it over
      # the compose network, never via the host. If you don't want it on the
      # host at all, comment this whole `ports` block out.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Listens on all host interfaces so other machines on your LAN can hit
      # the API directly (curl tests). The application is meant to be accessed
      # through the frontend instead.
      - "${BACKEND_PORT:-8001}:3000"

  frontend:
    # Build from the repo root, not ./frontend, because
    # frontend/tsconfig.json includes "../shared/**/*.ts" and
    # frontend/src/api/types.ts imports '../../../shared/api-contracts'.
    # With context=./frontend the sibling shared/ dir isn't visible in the
    # Docker build and tsc bails out.
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Listens on all host interfaces so other devices on your LAN can reach
      # the app via http://<host-ip>:${FRONTEND_PORT}. Restrict with a host
      # firewall if needed. Container port is 8080 because the image runs
      # nginx as a non-root user (can't bind < 1024).
      - "${FRONTEND_PORT:-8000}:8080"
