<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded-square plaque keeps the mark legible at favicon sizes against
       any browser tab background. Ink-900 matches the app's surface tone. -->
  <rect width="32" height="32" rx="7" fill="#11141a"/>

  <!-- High-contrast "A" monogram. Thin left, thick right, slim crossbar —
       borrowing Fraunces's serif personality. Reads as the brand initial AND
       as a small Greek pediment. -->
  <path d="M 8.5 26 L 16 5.5"
        fill="none" stroke="#7dd3c0" stroke-width="2.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 16 5.5 L 23.5 26"
        fill="none" stroke="#7dd3c0" stroke-width="3.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 12 19 L 20 19"
        fill="none" stroke="#7dd3c0" stroke-width="1.6"
        stroke-linecap="round"/>
</svg>
