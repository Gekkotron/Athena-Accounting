<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded-square plaque keeps the mark legible at favicon sizes against
       any browser tab background. Ink-900 matches the app's surface tone. -->
  <rect width="32" height="32" rx="7" fill="#11141a"/>

  <!-- Athena's chouette (Athene noctua), styled after the ancient Athenian
       tetradrachm silhouette: squat body, oversized frontal eyes, small beak.
       Sage emerald (#7dd3c0) is the app's primary accent. -->
  <path d="M 16 3
           C 21.5 3, 24 6.5, 23 11
           C 25 15, 25 21, 22 25.5
           Q 22 27.5, 20 27.5
           L 12 27.5
           Q 10 27.5, 10 25.5
           C 7 21, 7 15, 9 11
           C 8 6.5, 10.5 3, 16 3 Z"
        fill="none" stroke="#7dd3c0" stroke-width="1.7"
        stroke-linejoin="round" stroke-linecap="round"/>

  <circle cx="12.5" cy="11" r="2" fill="#7dd3c0"/>
  <circle cx="19.5" cy="11" r="2" fill="#7dd3c0"/>

  <path d="M 14.5 14.5 L 17.5 14.5 L 16 17 Z" fill="#7dd3c0"/>

  <path d="M 13 20 L 16 22.5 L 19 20"
        fill="none" stroke="#7dd3c0" stroke-width="1"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
</svg>
