server {
    # Rootless nginx binds > 1024. docker-compose publishes ${FRONTEND_PORT}:8080.
    listen 8080;
    server_name _;

    client_max_body_size 25M;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Baseline security headers. `always` so they land on error responses too.
    # - DENY (+ frame-ancestors 'none') blocks clickjacking against a
    #   logged-in user — the app has no legitimate embedding surface.
    # - nosniff stops the browser from second-guessing our Content-Type.
    # - Referrer-Policy trims the outbound Referer so URLs (which include
    #   query strings from the SPA) don't leak to third parties.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header Referrer-Policy "no-referrer" always;

    # API calls go to the backend container over the compose network. Cookies
    # forward through because we don't strip them.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA fallback — every non-API path serves index.html so React Router can
    # take over.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
