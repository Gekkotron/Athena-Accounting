coverage:
  status:
    project:
      default:
        # Target moves with the codebase, but tolerate a 2-point drop so a
        # single flaky reference (e.g. one job's upload skipped after a test
        # failure) doesn't post a red status on the next healthy commit.
        target: auto
        threshold: 2%
      backend:
        flags: [backend]
        target: auto
        threshold: 2%
      frontend:
        flags: [frontend]
        target: auto
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

flags:
  backend:
    paths:
      - backend/
    carryforward: true
  frontend:
    paths:
      - frontend/
    carryforward: true
